# ----------------------------------------------------------------------------
# HINDI (~30 min target)
# ----------------------------------------------------------------------------
hindi:
  # HONEST STATUS: a CC-BY-FLAGGED Hindi *lecture* on official channels was not
  # found by automated search in the time box (results were promo/registration
  # clips, not lectures). Hindi requires a human selection pass — which the brief
  # expects anyway. Two defensible routes, in order of preference:
  #
  #  (A) NPTEL Hindi/Hindi-translated course that DOES carry the YouTube CC-BY
  #      flag. Browse the nptelhrd / NPTEL-NOC IITM playlists for "(in Hindi)" /
  #      "हिंदी" titles and dry-run each:  python -m src.s01_fetch --dry-run
  #      Only CC-BY-flagged URLs pass the gate. Preferred: same machine-verifiable
  #      basis as English; release stays CC-BY-4.0.
  #
  #  (B) A Hindi channel that CC-licenses its uploads (verify the flag). NOTE:
  #      public-domain *text* (e.g. Premchand, d.1936, PD in India) does NOT make
  #      an audiobook PD — the narrator's RECORDING has its own copyright. So an
  #      audiobook is only usable if the channel itself CC-licenses it. Do not
  #      assume PD text => PD audio.
  # SELECTED via YouTube's native CC filter (search sp=EgIwAQ%3D%3D). NPTEL Hindi
  # lectures with the CC-BY flag proved unavailable, so the Hindi anchor is the
  # "Sadhguru Hindi" channel (Isha Foundation): a single real human speaker,
  # professional studio audio, CC-BY-flagged, and abundant — parallel to the
  # single-speaker English anchor. Picked over Hindi "Kahani"/audiobook channels
  # because many of those use AI-generated narration (unsuitable for a TTS set).
  # Caveats to confirm by ear: occasional English code-mix, a distinct accent, and
  # possible intro music/audience — the acoustic gate + listen pass handle these.
  - id: hi_sadhguru_inner_mgmt
    url: "https://www.youtube.com/watch?v=wDE2iilwsB8"   # ~40 min
    language: hi-IN
    channel: Sadhguru Hindi
    speaker: "Sadhguru (Hindi discourse)"
    content_type: discourse
    expected_emotion: [serious, conversational, neutral, formal]
    status: candidate                      # CC-BY verified; needs listen QC by ear
    notes: >
      One ~40-min talk likely covers the 30-min Hindi target after the funnel.
      Transcribe with language_code hi-IN (codemix-tolerant). More CC-BY talks from
      the same speaker if needed: QP3HFQCRuJU (~32m), s_TaBfnpXos, RBJE6SN7a_c,
      nipOTU03stI, bukxmmWXZbw.
    alt_ids: [QP3HFQCRuJU, s_TaBfnpXos, RBJE6SN7a_c, nipOTU03stI, bukxmmWXZbw]
  - id: hi_sadhguru_karma
    url: "https://www.youtube.com/watch?v=QP3HFQCRuJU"   # ~32 min, same speaker
    language: hi-IN
    channel: Sadhguru Hindi
    speaker: "Sadhguru (Hindi discourse)"
    content_type: discourse
    expected_emotion: [serious, conversational, neutral]
    status: candidate
    notes: "Second talk, same speaker, to reach the 30-min Hindi target."
  - id: hi_sadhguru_decision
    url: "https://www.youtube.com/watch?v=s_TaBfnpXos"
    language: hi-IN
    channel: Sadhguru Hindi
    speaker: "Sadhguru (Hindi discourse)"
    content_type: discourse
    expected_emotion: [conversational, neutral, serious]
    status: candidate
    notes: "Same speaker; discourse has long pauses -> ~50% speech density."
  - id: hi_sadhguru_purpose
    url: "https://www.youtube.com/watch?v=bukxmmWXZbw"
    language: hi-IN
    channel: Sadhguru Hindi
    speaker: "Sadhguru (Hindi discourse)"
