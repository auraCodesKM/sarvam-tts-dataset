# ----------------------------------------------------------------------------
# REJECTED source categories (documented judgment — goes in the report)
# ----------------------------------------------------------------------------
rejected:
  - source: "TED / TEDx talks"
    reason: "Licensed CC BY-NC-ND — the NoDerivatives clause forbids creating a
             derivative segmented dataset. Excluded despite clean audio."
  - source: "All India Radio / Prasar Bharati archives"
    reason: "Recordings sold under paid commercial/non-commercial licenses; no
             open reuse license. Excluded."
  - source: "NPTEL reupload channels (MY SWAYAM, answer/coaching channels)"
    reason: "Re-hosted without the CC-BY flag; provenance/licensing unclear. The
             fetch-time license gate rejects these automatically."
  - source: "General Indian news / podcast clips"
    reason: "Standard YouTube license (no reuse right) + frequent multi-speaker
             overlap and background music. Excluded."

# ----------------------------------------------------------------------------
# FINDINGS from source curation (2026-06-18) — documented for the report
# ----------------------------------------------------------------------------
findings:
  - "NPTEL's YouTube CC-BY flagging is INCONSISTENT across uploads: the
     'Psychrometry' course (nptelhrd) Parts 1-5 are all CC-BY, but many other
     official lecture uploads carry the Standard license. Lesson: do not trust
     the channel; verify every video's license flag (the s01 gate does this)."
  - "Public-domain TEXT (Premchand etc.) does not imply a public-domain
     RECORDING; an audiobook narration is separately copyrighted. PD text is not
     a licensing shortcut for audio."
  - "YouTube keyword search ranks reuploads/coaching channels above official
     lecture content; anchoring on a known CC-BY course + the license gate is
     more reliable than search ranking."
  - "The reliable way to find CC-BY content is YouTube's native CC search filter
     (append &sp=EgIwAQ%3D%3D to a results URL); keyword search alone misses it.
     This unlocked the Hindi half after NPTEL Hindi proved un-CC-flagged."
  - "Hindi 'Kahani'/audiobook channels are risky: many now use AI-generated TTS
     narration — unusable as training data for a TTS model. Verify a human voice."
  - "Rejected a Sadhguru '[Hindi Dub]' video: dubbing introduces a different
     (dub-artist) speaker, breaking single-speaker consistency."
