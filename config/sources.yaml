# =============================================================================
# sources.yaml — curated candidate sources (the highest-leverage manual step).
#
# CURATION THESIS
# ---------------
# For a small (60-min) TTS set, *acoustic consistency + clean licensing* beat
# diversity. We therefore anchor on NPTEL (nptelhrd and sibling official IIT/
# IISc channels): university lectures that are (a) single-speaker per course,
# (b) recorded in controlled conditions, (c) abundant in BOTH Indian English and
# Hindi, and — decisively — (d) carry the *YouTube Creative Commons Attribution
# flag*, which we verify PROGRAMMATICALLY at fetch time (see s01_fetch.py:
# license must == "Creative Commons Attribution license (reuse allowed)").
#
# This is the strongest licensing position available for a PUBLIC dataset: not
# "we believe it's reusable" but "YouTube's own metadata marks it reuse-allowed,
# and we recorded that flag per clip in the manifest." Because NPTEL is CC-BY,
# the published dataset is licensed CC-BY-4.0 with attribution to each source.
#
# SPEAKER DIVERSITY: we pick MULTIPLE courses (different professors) per language
# so the set isn't a single voice, while each *course* stays single-speaker.
#
# STATUS field: 'candidate' sources are license-verified but still require a
# human listen-pass (audio quality / true single-speaker) before 'confirmed'.
# Final clip selection happens after download + manual review — by design.
#
# license_required is enforced by the pipeline; any video failing it is dropped
# and logged, so this file can list playlists/channels broadly and let the gate
# filter. Prefer specific course playlists for predictable single-speaker audio.
# =============================================================================

license_required: "Creative Commons Attribution license (reuse allowed)"
dataset_license: "CC-BY-4.0"   # compatible with NPTEL CC-BY-(SA) attribution

# ----------------------------------------------------------------------------
# INDIAN ENGLISH (~30 min target)
# ----------------------------------------------------------------------------
# ANCHOR: the nptelhrd "Psychrometry" course (single consistent instructor) is
# CC-BY-flagged on YouTube — verified per-video via yt-dlp on 2026-06-18. Parts 1-5
# total ~127 min of source audio: ample for the ~30-min English target after the
# quality funnel, from ONE clean speaker. For speaker diversity, add 1-2 more
# CC-BY-flagged nptelhrd courses (different professors); verify first with
#   python -m src.s01_fetch --dry-run
# because many older NPTEL uploads are NOT CC-flagged (see `findings` below).
english:
  - id: en_psychro_p5
    url: "https://www.youtube.com/watch?v=IVz3N68fF1c"   # Part 5, ~21 min
    language: en-IN
    channel: nptelhrd
    speaker: "NPTEL instructor (Psychrometry)"
    content_type: lecture
    expected_emotion: [neutral, formal]
    status: confirmed_license     # CC-BY verified + validated through acoustic QC
    notes: >
      Validated: 88 VAD segments, 63 passed acoustic QC (median SNR 38 dB).
      Thermodynamics jargon is a deliberate ASR-error stress test.
  - id: en_psychro_p1
    url: "https://www.youtube.com/watch?v=es-2LA2bsu4"   # Part 1, ~30 min
    language: en-IN
    channel: nptelhrd
    speaker: "NPTEL instructor (Psychrometry)"
    content_type: lecture
    expected_emotion: [neutral, formal]
    status: confirmed_license     # CC-BY verified 2026-06
    notes: "Same course/speaker as p5."
  - id: en_psychro_p2
    url: "https://www.youtube.com/watch?v=ewtFkNDw-5c"   # Part 2, ~17 min
    language: en-IN
    channel: nptelhrd
    speaker: "NPTEL instructor (Psychrometry)"
    content_type: lecture
    expected_emotion: [neutral, formal]
    status: confirmed_license
    notes: "Same course/speaker. (Parts 3=xyJWx-HbXyI, 4=kSMMgwBP11c also CC-BY if more needed.)"

# ----------------------------------------------------------------------------
# HINDI (~30 min target)
# ----------------------------------------------------------------------------
hindi:
  # SOURCE SELECTION (v2, after manual review rejected the v1 discourse source).
  # v1 used "Sadhguru Hindi" discourses; manual TTS-quality review found audience
  # Q&A, multi-speaker segments, PA-system/processed timbre, and inconsistent
  # acoustics — passable for ASR but unfit for TTS. Lesson: SOURCE TYPE dominates.
  # Public talks structurally carry audience/PA/multi-speaker; studio narration
  # does not. v2 therefore requires a single-speaker, studio narration source.
  #
  # Candidates were auditioned objectively with src/audition.py (SNR + non-speech
  # gap-floor + speech density; see report). Winner: an individual narrator reading
  # Premchand's essay — a monologue (no dialogue/dramatisation/audience), CC-BY,
  # cleanest gap-floor (-52 dBFS, no music bed) and highest SNR of all candidates.
  - id: hi_premchand_essay_p1
    url: "https://www.youtube.com/watch?v=d02b11IOOq0"   # ~61 min
    language: hi-IN
    channel: Bhoopendra Pandey Hindi Channel
    speaker: "Bhoopendra Pandey (single narrator)"
    content_type: narration            # essay reading/explication — monologue
    expected_emotion: [neutral, formal, serious]
    status: candidate                  # CC-BY verified; audition SNR 29.7 / gap -52.2
    notes: >
      Premchand's essay "साहित्य का उद्देश्य" (text is public domain; the recording
      is the channel's, CC-BY-flagged). Single narrator, studio mic, no audience,
      no music bed, ~0.82 speech density -> ~50 min of speech in one 61-min source,
      ample for the 30-min Hindi target with one consistent voice.
  # Audition-ranked alternates if more material is needed (same QC pipeline):
  #   Audio Cart  (TnccGlNP7X4) Premchand story  SNR 26.7 / gap -47.4
  #   NCERT OFFICIAL (5TCSx_-85Ik) textbook audio SNR 25.9 / gap -49.0 (some
  #     chapters dramatised -> verify single-speaker by ear before use)
  # REJECTED on audition: The News Beak (PNLmea76Zt0) — continuous music bed
  #   (gap-floor -29.7 dBFS); Amish Tripathi novel — copyrighted text.

# ----------------------------------------------------------------------------
# REJECTED source categories (documented judgment — goes in the report)
# ----------------------------------------------------------------------------
rejected:
  - source: "TED / TEDx talks"
    reason: "Licensed CC BY-NC-ND — the NoDerivatives clause forbids creating a
             derivative segmented dataset. Excluded despite clean audio."
  - source: "All India Radio / Prasar Bharati archives"
    reason: "Recordings sold under paid commercial/non-commercial licenses; no
             open reuse license. Excluded."
  - source: "NPTEL reupload channels (MY SWAYAM, answer/coaching channels)"
    reason: "Re-hosted without the CC-BY flag; provenance/licensing unclear. The
             fetch-time license gate rejects these automatically."
  - source: "General Indian news / podcast clips"
    reason: "Standard YouTube license (no reuse right) + frequent multi-speaker
             overlap and background music. Excluded."
  - source: "Public discourse / talks (Sadhguru Hindi — v1 Hindi source)"
    reason: "CC-BY and high SNR, but manual TTS-quality review rejected it: audience
             Q&A, multi-speaker segments, PA-system/processed timbre, inconsistent
             acoustics. Fine for ASR, unfit for TTS. Replaced by studio narration.
             Lesson: source TYPE (studio narration vs public talk) predicts TTS
             quality better than any single acoustic metric."
  - source: "Hindi narration with a music bed (e.g. The News Beak autobiography)"
    reason: "Continuous background music under the voice (audition gap-floor
             -29.7 dBFS vs -52 for clean narration). Music bleed is disqualifying
             for TTS; caught objectively by src/audition.py before committing."

# ----------------------------------------------------------------------------
# FINDINGS from source curation (2026-06-18) — documented for the report
# ----------------------------------------------------------------------------
findings:
  - "NPTEL's YouTube CC-BY flagging is INCONSISTENT across uploads: the
     'Psychrometry' course (nptelhrd) Parts 1-5 are all CC-BY, but many other
     official lecture uploads carry the Standard license. Lesson: do not trust
     the channel; verify every video's license flag (the s01 gate does this)."
  - "Public-domain TEXT (Premchand etc.) does not imply a public-domain
     RECORDING; an audiobook narration is separately copyrighted. PD text is not
     a licensing shortcut for audio."
  - "YouTube keyword search ranks reuploads/coaching channels above official
     lecture content; anchoring on a known CC-BY course + the license gate is
     more reliable than search ranking."
  - "The reliable way to find CC-BY content is YouTube's native CC search filter
     (append &sp=EgIwAQ%3D%3D to a results URL); keyword search alone misses it.
     This unlocked the Hindi half after NPTEL Hindi proved un-CC-flagged."
  - "Hindi 'Kahani'/audiobook channels are risky: many now use AI-generated TTS
     narration — unusable as training data for a TTS model. Verify a human voice."
  - "Rejected a Sadhguru '[Hindi Dub]' video: dubbing introduces a different
     (dub-artist) speaker, breaking single-speaker consistency."
